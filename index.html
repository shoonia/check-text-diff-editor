  <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebApplication",
      "name": "Check Text Diff Editor",
      "description": "Compare and edit two text versions side by side.",
      "url": "https://shoonia.github.io/check-text-diff-editor/",
      "applicationCategory": "DeveloperApplication",
      "operatingSystem": "Any",
      "image": "https://shoonia.github.io/check-text-diff-editor/images/og-image.png",
      "browserRequirements": "Requires JavaScript"
    }

  <style>
    * {
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      height: 100vh;
      margin: 0;
      padding: 0;
      overflow: hidden;
      background: #1e1e1e;
      font: 14px/1.2 arial, sans-serif;
    }

    textarea {
      display: none;
    }

    #editor {
      position: fixed;
      inset: 0;
    }

    .loading-editor {
      visibility: hidden;
    }

    .editor-loader {
      display: flex;
      position: fixed;
      inset: 0 0 36px;
      z-index: 5;
      align-items: center;
      justify-content: center;
      gap: 10px;
      color: #d4d4d4;
      background: #1e1e1e;
      font: 14px/1.2 arial, sans-serif;
    }

    .loader-spinner {
      width: 16px;
      height: 16px;
      border: 2px solid #4a4a4a;
      border-top-color: #d4d4d4;
      border-radius: 50%;
      animation: spin 700ms linear infinite;
    }

    .footer {
      position: fixed;
      right: 0;
      bottom: 0;
      left: 0;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      height: 36px;
      padding: 0 12px;
      border-top: 1px solid #2d2d2d;
      background: #181818;
    }

    .support-nav {
      flex: 0 0 auto;
    }

    .support-link {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      color: #d4d4d4;
      text-decoration: none;
    }

    .support-link:hover {
      color: #ffffff;
      text-decoration: underline;
    }

    .language-control {
      display: flex;
      align-items: center;
      gap: 8px;
      min-width: 0;
      color: #d4d4d4;
    }

    #language-select {
      min-width: 180px;
      height: 24px;
      border: 1px solid #3c3c3c;
      border-radius: 3px;
      background: #252526;
      color: #f3f3f3;
    }

    #language-select:disabled {
      color: #858585;
    }

    .language-status {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      color: #bdbdbd;
    }

    .language-status[hidden] {
      display: none;
    }

    .language-status::before {
      width: 12px;
      height: 12px;
      border: 2px solid #4a4a4a;
      border-top-color: #d4d4d4;
      border-radius: 50%;
      content: "";
      animation: spin 700ms linear infinite;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }
  </style>
</head>

<body>
  <noscript>JavaScript is required to use this diff editor.</noscript>
  <main id="editor" class="loading-editor" aria-label="Diff Editor"></main>
  <div id="editor-loader" class="editor-loader" aria-live="polite">
    <span class="loader-spinner"></span>
    Loading editor...
  </div>
  <footer class="footer">
    <nav class="support-nav">
      <a class="support-link" href="https://u24.gov.ua/" aria-label="Support Ukraine - Visit official fundraising platform">
        <svg aria-hidden="true" viewBox="0 0 3 2" width="2em" focusable="false">
          <path fill="#005bbb" d="M0 0h3v1H0z"></path>
          <path fill="#ffd500" d="M0 1h3v1H0z"></path>
        </svg>
        Support Ukraine
      </a>
    </nav>
    <label class="language-control" for="language-select">
      <span id="language-status" class="language-status" aria-live="polite" hidden aria-labelledby="Loading language"></span>
      Language
      <select id="language-select">
        <option value="plaintext">Plain Text (plaintext)</option>
      </select>
    </label>
  </footer>
  <script type="module">
    const originalText = "\nOriginal text with grammar mistakes\n\nI has a small shop in the city.\nEvery morning, I opens the door at nine.\nMy customers is usually very kind.\nYesterday, a woman buyed two books and say thank you.\nI want to make my English more better.";
    const modifiedText = "\nCorrected text\n\nI have a small shop in the city.\nEvery morning, I open the door at nine.\nMy customers are usually very kind.\nYesterday, a woman bought two books and said thank you.\nI want to make my English better.";

    const baseUrl = "https://static.parastorage.com/unpkg/monaco-editor@0.55.1/min/vs";
    const defaultLanguage = "plaintext";
    const languageKey = "language";

    const h = (tag, props) => Object.assign(document.createElement(tag), props);
    const $ = (id) => document.getElementById(id);

    const getLanguageLabel = (language) => {
      const id = language.id;
      const alias = language.aliases?.[0];
      
      if (id.startsWith("freemarker2")) {
        return alias ?? id;
      }

      return alias ? `${alias} (${id})` : id;
    }

    const select = $("language-select");
    const status = $("language-status");

    const setLanguageLoading = (isLoading) => {
      select.disabled = isLoading;
      select.setAttribute("aria-busy", String(isLoading));
      status.hidden = !isLoading;
    }

    const loader = h("script", {
      async: true,
      src: `${baseUrl}/loader.js`,
      onload() {
        this.onload = null;

        require.config({
          paths: {
            vs: baseUrl
          }
        });

        require(["vs/editor/editor.main"], ({ editor, languages }) => {
          const original = editor.createModel(originalText, defaultLanguage);
          const modified = editor.createModel(modifiedText, defaultLanguage);
          const diffEditor = editor.createDiffEditor($("editor"), {
            theme: "vs-dark",
            renderWhitespace: "all",
            fontSize: 16,
            useShadowDOM: true,
            readOnly: false,
            originalEditable: true,
            automaticLayout: true
          });

          const fragment = new DocumentFragment();
          const selectedLanguage = localStorage.getItem(languageKey) ?? defaultLanguage;
          const options = languages.getLanguages()
            .sort((a, b) => {
              if (a.id === defaultLanguage) return -1;
              if (b.id === defaultLanguage) return 1;
              return a.id.localeCompare(b.id);
            })
            .map((language) => h("option", {
              value: language.id,
              selected: language.id === selectedLanguage,
              textContent: getLanguageLabel(language),
            }));

          fragment.append(...options);
          select.replaceChildren(fragment);
          select.addEventListener("change", async () => {
            const langId = select.value;

            setLanguageLoading(true);
            try {
              await languages.getLanguages().find((i) => i.id === langId)?.loader?.();
              localStorage.setItem(languageKey, langId);
            } finally {
              editor.setModelLanguage(original, langId);
              editor.setModelLanguage(modified, langId);
              setLanguageLoading(false);
              select.focus();
            }
          });

          diffEditor.setModel({ original, modified });
          diffEditor.getModifiedEditor().updateOptions({
            minimap: {
              enabled: true,
              showSlider: "always",
              autohide: "none",
            }
          });

          $("editor-loader").remove();
        });
      }
    });

    document.head.append(loader);
  </script>
</body>

</html>
